name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Disposable MySQL for the E2E suite. Health-checked so steps only run once
    # the server accepts connections. Empty root password keeps the test config
    # trivial — this database holds only throwaway test data.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: glow_cms
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: glow_cms
      DB_PORT: "3306"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # Non-blocking: surfaces high-severity advisories without failing CI on
      # transitive deps that can't be cleared without breaking-change upgrades
      # (see AGENT.md "Dependencies"). Tighten to a hard gate once clean.
      - name: Security audit (non-blocking)
        run: npm audit --audit-level=high || true

      - name: Initialize test database
        run: npm run db:init

      - name: E2E tests
        run: npm run test:e2e
